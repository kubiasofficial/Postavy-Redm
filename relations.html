<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>West Haven Vztahy</title>
  <style>
    :root {
      --bg: #070604;
      --ink: #1c120b;
      --paper: #c9aa78;
      --paper-light: #ead7af;
      --paper-muted: #a98d61;
      --gold: #c49547;
      --red: #8d2f35;
      --line: rgba(196, 149, 71, 0.28);
      --shadow: 0 32px 90px rgba(0, 0, 0, 0.58);
      --ease: 240ms cubic-bezier(0.22, 1, 0.36, 1);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    body {
      color: #f7ecd5;
      font-family: "Trebuchet MS", Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at 7% 8%, rgba(255, 196, 88, 0.42), transparent 9%),
        radial-gradient(circle at 8% 14%, rgba(255, 170, 58, 0.18), transparent 13%),
        linear-gradient(90deg, rgba(3, 2, 1, 0.98) 0 10%, rgba(15, 9, 5, 0.82) 28%, rgba(10, 7, 4, 0.9) 100%),
        repeating-linear-gradient(90deg, #120b06 0 34px, #180f08 34px 68px, #0d0805 68px 102px);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.38;
      background:
        linear-gradient(115deg, transparent 0 63%, rgba(196, 149, 71, 0.09) 63.2% 63.5%, transparent 64%),
        repeating-linear-gradient(0deg, rgba(255, 238, 196, 0.022) 0 1px, transparent 1px 6px);
      mix-blend-mode: screen;
    }

    .page {
      position: relative;
      z-index: 1;
      width: min(1530px, calc(100% - 22px));
      min-height: calc(100vh - 22px);
      margin: 11px auto;
    }

    .topbar {
      position: absolute;
      left: 58px;
      top: 52px;
      z-index: 6;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 0;
      border: 0;
      background: transparent;
      box-shadow: none;
      pointer-events: none;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 16px;
      min-width: 0;
      pointer-events: auto;
    }

    .seal {
      width: 58px;
      height: 58px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      border: 1px solid rgba(196, 149, 71, 0.48);
      border-radius: 999px;
      background:
        radial-gradient(circle, rgba(255, 238, 196, 0.12), rgba(17, 12, 8, 0.78) 62%, #060504),
        rgba(14, 10, 7, 0.9);
      box-shadow:
        inset 0 0 0 5px rgba(0, 0, 0, 0.3),
        0 16px 34px rgba(0, 0, 0, 0.42);
      display: none;
    }

    .seal img {
      width: 68%;
      height: 68%;
      display: block;
      object-fit: contain;
      filter: sepia(0.12) contrast(1.08);
    }

    .kicker {
      margin: 0 0 4px;
      color: var(--gold);
      font-size: 0.74rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      color: #fff1d5;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(2rem, 4vw, 3.8rem);
      line-height: 0.94;
      letter-spacing: 0;
      text-transform: uppercase;
      text-shadow: 0 15px 34px rgba(0, 0, 0, 0.52);
    }

    .menu-link {
      position: fixed;
      top: 32px;
      right: 34px;
      z-index: 20;
      min-height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 14px;
      border: 1px solid rgba(196, 149, 71, 0.42);
      border-radius: 4px;
      background:
        linear-gradient(180deg, rgba(95, 61, 30, 0.58), rgba(20, 15, 10, 0.88)),
        rgba(11, 9, 7, 0.86);
      color: #f2dfb8;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-decoration: none;
      text-transform: uppercase;
      transition: transform var(--ease), border-color var(--ease), color var(--ease);
      pointer-events: auto;
    }

    .menu-link:hover,
    .menu-link:focus-visible {
      transform: translateY(-2px);
      border-color: rgba(230, 184, 101, 0.72);
      color: #fff3d4;
      outline: none;
    }

    .page-wipe {
      position: fixed;
      inset: 0;
      z-index: 140;
      pointer-events: none;
      opacity: 0;
      background:
        linear-gradient(90deg, rgba(8, 6, 4, 0.98), rgba(61, 39, 19, 0.96) 48%, rgba(8, 6, 4, 0.98)),
        repeating-linear-gradient(90deg, rgba(255, 238, 196, 0.05) 0 1px, transparent 1px 12px);
      transform: translateY(105%);
    }

    body.is-page-entering .page-wipe {
      animation: page-wipe-in 560ms var(--ease) both;
    }

    body.is-page-leaving .page-wipe {
      animation: page-wipe-out 360ms var(--ease) both;
    }

    .case {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 430px;
      gap: 0;
      min-height: calc(100vh - 22px);
      padding: 20px 18px 20px 136px;
      border-radius: 16px;
      background:
        linear-gradient(90deg, rgba(5, 4, 3, 0.16), rgba(255, 238, 196, 0.035) 66%, rgba(0, 0, 0, 0.18)),
        rgba(7, 5, 4, 0.16);
    }

    .case::before,
    .case::after {
      content: "";
      position: absolute;
      pointer-events: none;
      z-index: 2;
    }

    .case::before {
      left: 0;
      top: 0;
      width: 128px;
      height: 100%;
      background:
        radial-gradient(circle at 35px 35px, rgba(255, 232, 144, 0.96) 0 4px, rgba(224, 137, 45, 0.5) 5px 20px, transparent 58px),
        radial-gradient(circle at 36px 36px, rgba(255, 166, 62, 0.22), transparent 96px),
        linear-gradient(36deg, transparent 0 51%, rgba(164, 104, 38, 0.7) 51% 52%, transparent 53% 100%),
        linear-gradient(160deg, transparent 0 42%, rgba(88, 54, 25, 0.9) 42% 62%, transparent 62%),
        linear-gradient(180deg, rgba(16, 9, 5, 0.2), rgba(5, 3, 2, 0.86));
      border-right: 1px solid rgba(196, 149, 71, 0.12);
    }

    .case::after {
      left: 34px;
      bottom: 70px;
      width: 90px;
      height: 130px;
      border-radius: 32px 32px 12px 12px;
      background:
        radial-gradient(circle at 50% 38%, transparent 0 14px, rgba(75, 45, 21, 0.95) 15px 22px, transparent 23px),
        linear-gradient(90deg, transparent 0 42%, rgba(25, 16, 10, 0.95) 42% 58%, transparent 58%),
        linear-gradient(145deg, rgba(56, 35, 21, 0.95), rgba(7, 5, 4, 0.98));
      box-shadow:
        0 22px 34px rgba(0, 0, 0, 0.58),
        inset 0 0 0 1px rgba(217, 162, 79, 0.16);
      transform: rotate(-19deg);
      opacity: 0.76;
    }

    .board {
      position: relative;
      min-height: calc(100vh - 62px);
      overflow: hidden;
      border: 1px solid rgba(180, 124, 45, 0.48);
      border-radius: 12px 0 0 12px;
      background:
        radial-gradient(circle at 50% 42%, rgba(196, 149, 71, 0.18), transparent 43%),
        radial-gradient(circle at 28% 66%, rgba(141, 47, 53, 0.12), transparent 26%),
        linear-gradient(145deg, rgba(32, 23, 15, 0.92), rgba(9, 7, 5, 0.98)),
        repeating-linear-gradient(90deg, rgba(255, 238, 196, 0.032) 0 1px, transparent 1px 12px);
      box-shadow: var(--shadow);
      isolation: isolate;
    }

    .board::before,
    .board::after {
      content: "";
      position: absolute;
      pointer-events: none;
      z-index: 0;
    }

    .board::before {
      inset: 26px;
      border: 1px solid rgba(196, 149, 71, 0.24);
      border-radius: 6px;
      box-shadow: inset 0 0 90px rgba(0, 0, 0, 0.38);
    }

    .board::after {
      inset: 0;
      opacity: 0.34;
      background:
        linear-gradient(122deg, transparent 0 46%, rgba(196, 149, 71, 0.16) 46.2% 46.45%, transparent 47% 100%),
        repeating-linear-gradient(0deg, rgba(255, 238, 196, 0.025) 0 1px, transparent 1px 7px);
    }

    .board-title {
      position: absolute;
      left: 38px;
      top: 106px;
      z-index: 3;
      margin: 0;
      color: rgba(237, 216, 179, 0.78);
      font-size: 0.74rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .relations-lines {
      position: absolute;
      inset: 0;
      z-index: 1;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: visible;
    }

    .relation-line {
      stroke: var(--relation-color);
      stroke-width: var(--relation-width);
      stroke-linecap: round;
      opacity: 0.56;
      filter:
        drop-shadow(0 0 4px color-mix(in srgb, var(--relation-color) 26%, transparent))
        drop-shadow(0 6px 8px rgba(0, 0, 0, 0.42));
      transition: opacity var(--ease), stroke-width var(--ease), filter var(--ease);
    }

    .relation-line.is-dimmed {
      opacity: 0.14;
      filter: none;
    }

    .relation-line.is-active {
      opacity: 0.98;
      stroke-width: calc(var(--relation-width) + 0.9);
      filter:
        drop-shadow(0 0 10px color-mix(in srgb, var(--relation-color) 46%, transparent))
        drop-shadow(0 10px 14px rgba(0, 0, 0, 0.34));
    }

    .relation-line.is-debt {
      stroke-dasharray: 8 7;
    }

    .relation-line.is-secret {
      stroke-dasharray: 2 8;
    }

    .nodes {
      position: absolute;
      inset: 0;
      z-index: 2;
    }

    .node {
      position: absolute;
      left: var(--x);
      top: var(--y);
      width: 150px;
      min-height: 166px;
      display: grid;
      justify-items: center;
      gap: 9px;
      padding: 0;
      border: 0;
      background: transparent;
      color: #f2dfbc;
      cursor: pointer;
      font: inherit;
      text-align: center;
      transform: translate(-50%, -50%);
    }

    .portrait {
      position: relative;
      width: 106px;
      height: 106px;
      display: block;
      padding: 7px;
      border: 2px solid rgba(184, 130, 55, 0.74);
      border-radius: 999px;
      background:
        radial-gradient(circle, rgba(255, 238, 196, 0.16), rgba(16, 10, 7, 0.88) 64%),
        #120d09;
      box-shadow:
        0 24px 42px rgba(0, 0, 0, 0.5),
        inset 0 0 0 2px rgba(255, 238, 196, 0.18),
        0 0 28px color-mix(in srgb, var(--node-color) 24%, transparent);
      transition: transform var(--ease), border-color var(--ease), filter var(--ease);
    }

    .portrait::before {
      content: "";
      position: absolute;
      left: 50%;
      top: -9px;
      width: 15px;
      height: 15px;
      border: 1px solid rgba(255, 235, 190, 0.74);
      border-radius: 999px;
      background:
        radial-gradient(circle at 35% 35%, #fff3ce 0 14%, #b77a36 16% 48%, #2b1a0c 52%);
      box-shadow: 0 5px 10px rgba(0, 0, 0, 0.34);
      transform: translateX(-50%);
    }

    .portrait img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      border-radius: inherit;
      filter: sepia(0.18) contrast(1.06) brightness(0.92);
    }

    .node-name {
      max-width: 150px;
      display: inline-block;
      min-width: 112px;
      padding: 8px 10px 7px;
      border: 1px solid rgba(111, 72, 30, 0.52);
      border-radius: 2px;
      background:
        linear-gradient(180deg, rgba(217, 182, 117, 0.94), rgba(137, 91, 43, 0.88)),
        #b4874c;
      color: #21150c;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0;
      line-height: 1.2;
      text-transform: uppercase;
      text-shadow: 0 1px 0 rgba(255, 235, 185, 0.32);
      box-shadow: 0 10px 18px rgba(0, 0, 0, 0.32);
    }

    .node.is-active .portrait,
    .node:hover .portrait,
    .node:focus-visible .portrait {
      transform: translateY(-4px) scale(1.05);
      border-color: color-mix(in srgb, var(--node-color) 70%, #fff2d0);
      filter: brightness(1.08);
    }

    .node:focus-visible {
      outline: none;
    }

    .dossier {
      position: relative;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: 14px;
      min-height: calc(100vh - 62px);
      padding: 42px 42px 30px;
      border: 1px solid rgba(84, 55, 25, 0.74);
      border-left: 0;
      border-radius: 0 12px 12px 0;
      background:
        radial-gradient(circle at 88% 4%, rgba(76, 42, 18, 0.36), transparent 10%),
        linear-gradient(90deg, rgba(95, 62, 31, 0.14) 0 1px, transparent 1px 100%),
        linear-gradient(180deg, rgba(238, 210, 159, 0.98), rgba(202, 163, 101, 0.98) 54%, rgba(167, 123, 67, 0.98)),
        #d7b779;
      color: #2b1a0d;
      box-shadow:
        var(--shadow),
        inset 18px 0 34px rgba(43, 22, 10, 0.18);
    }

    .dossier::before {
      content: "";
      position: absolute;
      inset: 22px;
      pointer-events: none;
      border: 1px solid rgba(77, 49, 22, 0.24);
      border-radius: 4px;
      box-shadow:
        inset 0 0 0 1px rgba(255, 241, 202, 0.2),
        inset 0 0 48px rgba(78, 43, 18, 0.12);
    }

    .dossier-head,
    .dossier-body,
    .legend {
      position: relative;
      z-index: 1;
    }

    .dossier-title {
      margin: 0;
      color: #2f1b0e;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 2.1rem;
      line-height: 1;
      text-transform: uppercase;
    }

    .status-strip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      padding: 8px 10px;
      border: 1px solid color-mix(in srgb, var(--active-color) 54%, rgba(255, 238, 196, 0.2));
      border-radius: 4px;
      background: rgba(255, 245, 215, 0.36);
      color: #4b2516;
      font-size: 0.75rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .status-dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: var(--active-color);
      box-shadow: 0 0 12px var(--active-color);
    }

    .section-label {
      margin: 0 0 9px;
      color: #8c5b20;
      font-size: 0.68rem;
      font-weight: 800;
      letter-spacing: 0.17em;
      text-transform: uppercase;
    }

    .note {
      margin: 0;
      color: #3c2615;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 1.03rem;
      line-height: 1.62;
    }

    .relationship-list {
      display: grid;
      gap: 9px;
      margin-top: 18px;
      max-height: 330px;
      overflow: auto;
      padding-right: 4px;
    }

    .relationship-list::-webkit-scrollbar {
      width: 8px;
    }

    .relationship-list::-webkit-scrollbar-thumb {
      border-radius: 999px;
      background: rgba(196, 149, 71, 0.44);
    }

    .file-button {
      display: grid;
      grid-template-columns: 10px minmax(0, 1fr);
      gap: 9px;
      align-items: center;
      min-height: 46px;
      padding: 10px;
      border: 1px solid rgba(90, 58, 25, 0.18);
      border-radius: 4px;
      background: rgba(255, 238, 196, 0.24);
      color: #392313;
      cursor: pointer;
      font: inherit;
      text-align: left;
      transition: transform var(--ease), border-color var(--ease), background var(--ease);
    }

    .file-button::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--file-color);
      box-shadow: 0 0 10px color-mix(in srgb, var(--file-color) 50%, transparent);
    }

    .file-button:hover,
    .file-button:focus-visible,
    .file-button.is-active {
      transform: translateX(-3px);
      border-color: color-mix(in srgb, var(--file-color) 58%, rgba(255, 238, 196, 0.2));
      background: rgba(255, 230, 176, 0.42);
      outline: none;
    }

    .file-title {
      display: block;
      color: #2b1a0d;
      font-size: 0.86rem;
      font-weight: 800;
      line-height: 1.2;
    }

    .file-meta {
      display: block;
      margin-top: 3px;
      color: #765226;
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .legend {
      display: grid;
      gap: 8px;
      padding-top: 14px;
      border-top: 1px solid rgba(84, 55, 25, 0.24);
    }

    .legend-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px 10px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #4b321a;
      font-size: 0.78rem;
    }

    .legend-line {
      width: 30px;
      height: 2px;
      flex: 0 0 auto;
      background: var(--legend-color);
      box-shadow: 0 0 10px color-mix(in srgb, var(--legend-color) 45%, transparent);
    }

    .loading {
      margin: 0;
      color: #765226;
      font-size: 0.76rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    @media (max-width: 980px) {
      .page {
        width: min(100% - 20px, 760px);
        margin: 10px auto;
      }

      .topbar,
      .case {
        grid-template-columns: 1fr;
      }

      .topbar {
        display: grid;
      }

      .menu-link {
        justify-self: start;
      }

      .board,
      .dossier {
        min-height: 620px;
      }
    }

    @media (max-width: 620px) {
      .page {
        width: calc(100% - 14px);
      }

      .topbar,
      .dossier {
        padding: 14px;
      }

      .brand {
        align-items: flex-start;
      }

      .seal {
        width: 48px;
        height: 48px;
      }

      h1 {
        font-size: clamp(2.1rem, 16vw, 3.4rem);
      }

      .board {
        min-height: 560px;
      }

      .board-title {
        left: 22px;
        top: 20px;
      }

      .node {
        width: 102px;
        min-height: 130px;
      }

      .portrait {
        width: 74px;
        height: 74px;
      }

      .node-name {
        max-width: 104px;
        font-size: 0.62rem;
      }

      .legend-grid {
        grid-template-columns: 1fr;
      }
    }

    @keyframes page-wipe-in {
      0% {
        opacity: 1;
        transform: translateY(0);
      }
      100% {
        opacity: 0;
        transform: translateY(-105%);
      }
    }

    @keyframes page-wipe-out {
      0% {
        opacity: 0;
        transform: translateY(105%);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="page-wipe" aria-hidden="true"></div>
  <main class="page">
    <header class="topbar">
      <div class="brand">
        <span class="seal" aria-hidden="true">
          <img src="images/whrp.png" alt="">
        </span>
        <div>
          <p class="kicker">West Haven Case File</p>
          <h1>Vztahy</h1>
        </div>
      </div>
      <a class="menu-link" href="index.html" id="menuLink">Vrátit se na menu</a>
    </header>

    <section class="case" aria-label="Mapa vztahů postav">
      <div class="board">
        <p class="board-title">Evidence board / 1899</p>
        <svg class="relations-lines" id="relationsLines" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true"></svg>
        <div class="nodes" id="nodes"></div>
      </div>

      <aside class="dossier" id="dossier" aria-live="polite">
        <header class="dossier-head">
          <p class="kicker">Relationship Dossier</p>
          <h2 class="dossier-title" id="dossierTitle">Načítám spis</h2>
          <div class="status-strip" id="statusStrip">
            <span class="status-dot" aria-hidden="true"></span>
            <span id="statusText">Čeká se</span>
          </div>
        </header>

        <div class="dossier-body">
          <p class="section-label">Poznámka</p>
          <p class="note" id="dossierNote">Síť vztahů se připravuje.</p>
          <div class="relationship-list" id="relationshipList"></div>
        </div>

        <footer class="legend">
          <p class="section-label">Legenda</p>
          <div class="legend-grid" id="legendGrid"></div>
          <p class="loading" id="loadStatus">Lokální spis připraven.</p>
        </footer>
      </aside>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
    import {
      collection,
      getDocs,
      getFirestore
    } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBXUgRu0V3a2xQG1-r-pEXug5Vdj6nIJyE",
      authDomain: "postavy-redm.firebaseapp.com",
      projectId: "postavy-redm",
      storageBucket: "postavy-redm.firebasestorage.app",
      messagingSenderId: "639963767356",
      appId: "1:639963767356:web:3d4090b049785150fc1939"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const characterRelationshipsRef = collection(db, "characterRelationships");

    const characters = [
      {
        id: "zeke",
        listName: "Ezekiel Crowe",
        role: "Psanec / samotářský tulák",
        portrait: "images/zeke.png",
        portraitAlt: "Portrét postavy Ezekiel Crowe"
      },
      {
        id: "silas",
        listName: "Silas Crowe",
        role: "Vyjednavač / manipulátor",
        portrait: "images/Silas.png",
        portraitAlt: "Portrét postavy Silas Crowe"
      },
      {
        id: "violet",
        listName: "Violet Crowe",
        role: "Manipulátorka / střelkyně",
        portrait: "images/Violet.png",
        portraitAlt: "Portrét postavy Violet Crowe"
      },
      {
        id: "william",
        listName: "William Hart",
        role: "Vyjednavač / ochránce",
        portrait: "images/William.png",
        portraitAlt: "Portrét postavy William Hart"
      },
      {
        id: "thomas-mercer",
        listName: "Thomas Mercer",
        role: "Rančer / koňák",
        portrait: "images/Thomas.png",
        portraitAlt: "Portrét postavy Thomas Mercer"
      }
    ];

    const relationTypes = {
      family: { label: "Rodina", color: "#c89b45", width: 1.35 },
      ally: { label: "Spojenec", color: "#8fbc8f", width: 1.15 },
      close: { label: "Přítel", color: "#d6c48a", width: 1.2 },
      trust: { label: "Důvěra", color: "#78b7a4", width: 1.12 },
      respect: { label: "Respekt", color: "#9db3c7", width: 1.08 },
      protection: { label: "Ochrana", color: "#7fb2d0", width: 1.18 },
      mentor: { label: "Mentor", color: "#b8a36a", width: 1.05 },
      debt: { label: "Dluh", color: "#c69a4a", width: 1.16 },
      commonGoal: { label: "Společný cíl", color: "#b0a05a", width: 1.05 },
      secret: { label: "Tajemství", color: "#9f8dca", width: 1.08 },
      suspicion: { label: "Podezření", color: "#b08a80", width: 1.06 },
      distrust: { label: "Nedůvěra", color: "#b78183", width: 1.14 },
      fear: { label: "Strach", color: "#7f8a93", width: 1.04 },
      blackmail: { label: "Vydírání", color: "#6f5b78", width: 1.18 },
      betrayal: { label: "Zrada", color: "#8f2f3d", width: 1.26 },
      rivalry: { label: "Rivalita", color: "#b84a4a", width: 1.26 },
      hatred: { label: "Nenávist", color: "#d33f3f", width: 1.35 },
      romance: { label: "Romantika", color: "#d2789b", width: 1.18 },
      tension: { label: "Napětí", color: "#c080a0", width: 1.08 },
      former: { label: "Bývalý vztah", color: "#a88977", width: 1.04 }
    };

    const relationshipNodes = {
      zeke: { x: 50, y: 24 },
      silas: { x: 25, y: 45 },
      violet: { x: 75, y: 45 },
      "thomas-mercer": { x: 36, y: 78 },
      william: { x: 64, y: 78 }
    };

    const characterColors = {
      zeke: "#c74d58",
      silas: "#4ca66f",
      william: "#d870a8",
      "thomas-mercer": "#8fa3a8",
      violet: "#d7a8cf"
    };

    const defaultRelationships = [
      {
        from: "zeke",
        to: "silas",
        type: "family",
        label: "Bratři Croweové",
        note: "Krev je drží pohromadě, i když Zeke mizí do ticha a Silas se snaží najít pravdu mezi slovy druhých."
      },
      {
        from: "zeke",
        to: "violet",
        type: "family",
        label: "Sourozenci Croweovi",
        note: "Violet Zeka zná dost na to, aby se ho nebála slepě. Právě proto mezi nimi zůstává opatrnost i nevyřčená loajalita."
      },
      {
        from: "silas",
        to: "violet",
        type: "family",
        label: "Rodinná paměť",
        note: "Silas a Violet umí číst stejné stíny Croweovy rodiny, jen každý používá jinou zbraň: on řeč, ona pozorování."
      },
      {
        from: "violet",
        to: "william",
        type: "ally",
        label: "Tiché spojenectví",
        note: "William je pro Violet vzácný typ člověka: nestaví ji do klece a nesnaží se vlastnit její tajemství."
      },
      {
        from: "zeke",
        to: "thomas-mercer",
        type: "distrust",
        label: "Napjatá vzdálenost",
        note: "Thomas představuje řád a disciplínu. Zeke je všechno, co se takovému řádu špatně zapisuje do knih."
      },
      {
        from: "silas",
        to: "thomas-mercer",
        type: "secret",
        label: "Otázky bez odpovědi",
        note: "Silas ví, že Thomas může být užitečný zdroj. Thomas zase tuší, že Silas se nikdy neptá jen jednou."
      },
      {
        from: "william",
        to: "thomas-mercer",
        type: "debt",
        label: "Nevyrovnaný účet",
        note: "Mezi Williamem a Thomasem leží věci, které nejsou nepřátelstvím, ale ani čistým přátelstvím."
      },
      {
        from: "zeke",
        to: "william",
        type: "rivalry",
        label: "Ostražitý respekt",
        note: "Zeke respektuje lidi, kteří se nerozklepou při prvním pohledu. William mu ale stojí příliš blízko u rodiny."
      }
    ];

    let relationships = defaultRelationships.map((relationship) => ({ ...relationship }));
    let selectedRelationshipId = getRelationshipId(relationships[0].from, relationships[0].to);

    const refs = {
      lines: document.getElementById("relationsLines"),
      nodes: document.getElementById("nodes"),
      dossier: document.getElementById("dossier"),
      dossierTitle: document.getElementById("dossierTitle"),
      statusStrip: document.getElementById("statusStrip"),
      statusText: document.getElementById("statusText"),
      dossierNote: document.getElementById("dossierNote"),
      relationshipList: document.getElementById("relationshipList"),
      legendGrid: document.getElementById("legendGrid"),
      loadStatus: document.getElementById("loadStatus")
    };

    const startPageEnter = () => {
      document.body.classList.add("is-page-entering");
      window.setTimeout(() => {
        document.body.classList.remove("is-page-entering");
      }, 620);
    };

    const navigateWithWipe = (url) => {
      document.body.classList.add("is-page-leaving");
      window.setTimeout(() => {
        window.location.href = url;
      }, 300);
    };

    function getRelationshipId(from, to) {
      return [from, to].sort().join("--");
    }

    function getCharacter(id) {
      return characters.find((character) => character.id === id);
    }

    function getRelationshipLabel(relationship) {
      const from = getCharacter(relationship.from);
      const to = getCharacter(relationship.to);
      return `${from?.listName || relationship.from} ↔ ${to?.listName || relationship.to}`;
    }

    function getSelectedRelationship() {
      return relationships.find((relationship) => getRelationshipId(relationship.from, relationship.to) === selectedRelationshipId)
        || relationships[0];
    }

    function setSelectedRelationship(id) {
      selectedRelationshipId = id;
      render();
    }

    function renderLines() {
      refs.lines.replaceChildren();
      const selected = getSelectedRelationship();
      const selectedId = selected ? getRelationshipId(selected.from, selected.to) : "";

      relationships.forEach((relationship) => {
        const fromNode = relationshipNodes[relationship.from];
        const toNode = relationshipNodes[relationship.to];
        if (!fromNode || !toNode) return;

        const type = relationTypes[relationship.type] || relationTypes.secret;
        const id = getRelationshipId(relationship.from, relationship.to);
        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
        line.setAttribute("x1", fromNode.x);
        line.setAttribute("y1", fromNode.y);
        line.setAttribute("x2", toNode.x);
        line.setAttribute("y2", toNode.y);
        line.classList.add("relation-line", `is-${relationship.type}`);
        line.classList.toggle("is-active", id === selectedId);
        line.classList.toggle("is-dimmed", Boolean(selectedId) && id !== selectedId);
        line.style.setProperty("--relation-color", type.color);
        line.style.setProperty("--relation-width", String(type.width));
        refs.lines.appendChild(line);
      });
    }

    function renderNodes() {
      refs.nodes.replaceChildren();
      const selected = getSelectedRelationship();
      const activeCharacterIds = new Set(selected ? [selected.from, selected.to] : []);

      characters.forEach((character) => {
        const node = relationshipNodes[character.id];
        if (!node) return;

        const button = document.createElement("button");
        button.type = "button";
        button.className = "node";
        button.classList.toggle("is-active", activeCharacterIds.has(character.id));
        button.dataset.character = character.id;
        button.style.setProperty("--x", `${node.x}%`);
        button.style.setProperty("--y", `${node.y}%`);
        button.style.setProperty("--node-color", characterColors[character.id] || "#c49547");

        const portrait = document.createElement("span");
        portrait.className = "portrait";
        const image = document.createElement("img");
        image.src = character.portrait;
        image.alt = character.portraitAlt;
        portrait.appendChild(image);

        const name = document.createElement("span");
        name.className = "node-name";
        name.textContent = character.listName;

        button.append(portrait, name);
        refs.nodes.appendChild(button);
      });
    }

    function renderDossier() {
      const relationship = getSelectedRelationship();
      if (!relationship) return;

      const type = relationTypes[relationship.type] || relationTypes.secret;
      refs.dossier.style.setProperty("--active-color", type.color);
      refs.dossierTitle.textContent = getRelationshipLabel(relationship);
      refs.statusText.textContent = `Stav: ${type.label}`;
      refs.dossierNote.textContent = relationship.note || "Vztah zatím nemá podrobnější poznámku.";

      refs.relationshipList.replaceChildren();
      relationships.forEach((item) => {
        const itemType = relationTypes[item.type] || relationTypes.secret;
        const id = getRelationshipId(item.from, item.to);
        const button = document.createElement("button");
        button.type = "button";
        button.className = "file-button";
        button.classList.toggle("is-active", id === selectedRelationshipId);
        button.dataset.relationship = id;
        button.style.setProperty("--file-color", itemType.color);

        const text = document.createElement("span");
        const title = document.createElement("span");
        title.className = "file-title";
        title.textContent = item.label;
        const meta = document.createElement("span");
        meta.className = "file-meta";
        meta.textContent = `${getRelationshipLabel(item)} | ${itemType.label}`;
        text.append(title, meta);

        button.appendChild(text);
        refs.relationshipList.appendChild(button);
      });
    }

    function renderLegend() {
      refs.legendGrid.replaceChildren();
      const usedTypes = [...new Set(relationships.map((relationship) => relationship.type))]
        .map((typeId) => relationTypes[typeId])
        .filter(Boolean);

      usedTypes.forEach((type) => {
        const item = document.createElement("div");
        item.className = "legend-item";
        const line = document.createElement("span");
        line.className = "legend-line";
        line.style.setProperty("--legend-color", type.color);
        const label = document.createElement("span");
        label.textContent = type.label;
        item.append(line, label);
        refs.legendGrid.appendChild(item);
      });
    }

    function render() {
      renderLines();
      renderNodes();
      renderDossier();
      renderLegend();
    }

    async function loadApprovedRelationships() {
      refs.loadStatus.textContent = "Načítám schválené vazby...";

      try {
        const snapshot = await getDocs(characterRelationshipsRef);
        const byId = new Map(defaultRelationships.map((relationship) => [
          getRelationshipId(relationship.from, relationship.to),
          { ...relationship }
        ]));

        snapshot.docs.forEach((entryDoc) => {
          const relationship = entryDoc.data();
          if (!relationship.from || !relationship.to || !relationship.type) return;
          byId.set(getRelationshipId(relationship.from, relationship.to), {
            from: relationship.from,
            to: relationship.to,
            type: relationship.type,
            label: relationship.label || getRelationshipLabel(relationship),
            note: relationship.note || "Vztah byl schválen adminem.",
            source: relationship.source || "approved"
          });
        });

        relationships = Array.from(byId.values());
        if (!getSelectedRelationship() && relationships[0]) {
          selectedRelationshipId = getRelationshipId(relationships[0].from, relationships[0].to);
        }
        refs.loadStatus.textContent = "Schválené vazby načteny.";
      } catch (error) {
        console.warn("Approved relationships could not be loaded:", error);
        refs.loadStatus.textContent = "Používám lokální spis vztahů.";
      }

      render();
    }

    refs.relationshipList.addEventListener("click", (event) => {
      const button = event.target.closest("[data-relationship]");
      if (!button) return;
      setSelectedRelationship(button.dataset.relationship);
    });

    refs.nodes.addEventListener("click", (event) => {
      const button = event.target.closest("[data-character]");
      if (!button) return;
      const relationship = relationships.find((item) => (
        item.from === button.dataset.character || item.to === button.dataset.character
      ));
      if (!relationship) return;
      setSelectedRelationship(getRelationshipId(relationship.from, relationship.to));
    });

    document.getElementById("menuLink")?.addEventListener("click", (event) => {
      event.preventDefault();
      navigateWithWipe("index.html");
    });

    startPageEnter();
    render();
    loadApprovedRelationships();
  </script>
</body>
</html>
