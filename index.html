<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#070908">
  <title>MechaTurnaj</title>
  <style>
    :root { color-scheme: dark; font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; overflow: hidden; background: #050706; color: #fff; }
    body::before {
      content: ""; position: fixed; inset: 0;
      background: linear-gradient(90deg, rgba(0,0,0,.08), rgba(0,0,0,.2)), url('/Obrazky/uvodni-pozadi.png') center/cover no-repeat;
      transform: scale(1.015); animation: reveal 1.2s ease-out both;
    }
    body::after { content: ""; position: fixed; inset: 0; background: radial-gradient(circle at 50% 42%, transparent 0 18%, rgba(0,0,0,.16) 58%, rgba(0,0,0,.6) 100%); pointer-events: none; }
    main { position: relative; z-index: 1; min-height: 100vh; display: grid; place-items: center; padding: 32px; text-align: center; }
    .hero { width: min(760px, 100%); transform: translateY(-2vh); }
    .eyebrow { margin: 0 0 14px; color: #c8ff36; font-size: clamp(.72rem, 1.2vw, .9rem); font-weight: 900; letter-spacing: .32em; text-transform: uppercase; text-shadow: 0 2px 16px #000; }
    h1 { margin: 0; font-size: clamp(3rem, 8vw, 7rem); line-height: .82; letter-spacing: -.065em; text-transform: uppercase; filter: drop-shadow(0 8px 2px #000) drop-shadow(0 0 28px #000); }
    h1 span { display: inline-block; }
    h1 span:nth-child(1) { color: #9be42b; transform: rotate(-2deg); }
    h1 span:nth-child(2) { color: #f3efe5; }
    h1 span:nth-child(3) { color: #ef405d; transform: rotate(1deg); }
    h1 span:nth-child(4) { color: #21aee4; }
    h1 span:nth-child(5) { color: #a561dc; transform: rotate(-1deg); }
    .subtitle { margin: 22px auto 28px; max-width: 540px; color: rgba(255,255,255,.8); font-size: clamp(.95rem, 1.6vw, 1.1rem); line-height: 1.6; text-shadow: 0 2px 14px #000; }
    .discord-button { display: inline-flex; align-items: center; gap: 12px; min-height: 58px; padding: 0 25px; border: 1px solid rgba(255,255,255,.3); border-radius: 16px; background: linear-gradient(135deg, #7289da, #5865f2); color: #fff; box-shadow: 0 12px 38px rgba(88,101,242,.35), inset 0 1px rgba(255,255,255,.25); font: inherit; font-weight: 850; text-decoration: none; transition: transform .2s, box-shadow .2s; }
    .discord-button:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 18px 48px rgba(88,101,242,.5), inset 0 1px rgba(255,255,255,.3); }
    .discord-button svg { width: 27px; fill: currentColor; }
    .status { min-height: 24px; margin-top: 16px; color: #ffc844; font-size: .9rem; font-weight: 700; text-shadow: 0 2px 8px #000; }
    .user { display: none; align-items: center; justify-content: center; gap: 14px; }
    .user.visible { display: flex; }
    .user img { width: 52px; height: 52px; border: 2px solid #c8ff36; border-radius: 50%; background: #111; }
    .user strong, .user small { display: block; text-align: left; }
    .user small { color: #b9c1ba; margin-top: 4px; }
    .logout { border: 0; background: transparent; color: #c6ccc7; cursor: pointer; text-decoration: underline; }
    @keyframes reveal { from { opacity: 0; transform: scale(1.08); } to { opacity: 1; transform: scale(1.015); } }
    @media (max-width: 700px) {
      body { overflow: auto; }
      body::before { background-position: 58% center; opacity: .7; }
      main { padding: 22px; background: rgba(0,0,0,.22); }
      h1 { font-size: clamp(3rem, 17vw, 5.4rem); }
      .hero { transform: none; }
    }
    @media (prefers-reduced-motion: reduce) { body::before { animation: none; } .discord-button { transition: none; } }
  </style>
</head>
<body>
  <main>
    <section class="hero" aria-labelledby="title">
      <p class="eyebrow">Česko-slovenský komunitní turnaj</p>
      <h1 id="title"><span>M</span><span>e</span><span>c</span><span>h</span><span>a</span><br>Turnaj</h1>
      <p class="subtitle">Schovej se. Splyň s okolím. Nenech se odhalit. Přihlas se Discordem a vstup do soutěže.</p>
      <div id="login">
        <a class="discord-button" href="/api/auth/discord">
          <svg viewBox="0 0 127.14 96.36" aria-hidden="true"><path d="M107.7 8.07A105.15 105.15 0 0 0 81.47 0a72.06 72.06 0 0 0-3.36 6.83 97.68 97.68 0 0 0-29.11 0A72.37 72.37 0 0 0 45.64 0a105.89 105.89 0 0 0-26.25 8.09C2.79 32.65-1.71 56.6.54 80.21a105.73 105.73 0 0 0 32.17 16.15 77.7 77.7 0 0 0 6.89-9.39 68.42 68.42 0 0 1-10.85-5.18c.91-.66 1.8-1.34 2.66-2.05a75.57 75.57 0 0 0 64.32 0c.87.71 1.76 1.39 2.66 2.05a68.68 68.68 0 0 1-10.87 5.19 77 77 0 0 0 6.89 9.39 105.25 105.25 0 0 0 32.17-16.15c2.64-27.38-4.51-51.11-18.88-72.14ZM42.45 65.69C36.18 65.69 31 60 31 53s5-12.7 11.45-12.7S54 46 53.89 53s-5.05 12.69-11.44 12.69Zm42.24 0C78.41 65.69 73.25 60 73.25 53s5-12.7 11.44-12.7S96.23 46 96.12 53s-5.04 12.69-11.43 12.69Z"/></svg>
          Připojit se přes Discord
        </a>
      </div>
      <div id="user" class="user"></div>
      <p id="status" class="status" role="status"></p>
    </section>
  </main>
  <script>
    const statusMessages = {
      "not-member": "Nejdřív se připoj na Discord server MECCHA TURNAJ.",
      "invalid-state": "Přihlášení vypršelo. Zkus to prosím znovu.",
      "oauth-failed": "Discord přihlášení se nezdařilo.",
      "profile-failed": "Discord profil se nepodařilo načíst.",
      "membership-check-failed": "Členství na serveru se nepodařilo ověřit.",
      "server-error": "Při přihlášení nastala chyba. Zkus to znovu."
    };
    const params = new URLSearchParams(location.search);
    const authResult = params.get("auth");
    if (statusMessages[authResult]) document.getElementById("status").textContent = statusMessages[authResult];
    if (authResult) history.replaceState({}, "", "/");

    fetch("/api/auth/session", { credentials: "same-origin" }).then(async (response) => {
      if (!response.ok) return;
      const { user } = await response.json();
      document.getElementById("login").hidden = true;
      const container = document.getElementById("user");
      container.classList.add("visible");
      const avatar = user.avatarUrl ? `<img src="${user.avatarUrl}" alt="">` : "";
      container.innerHTML = `${avatar}<div><strong>Vítej, ${escapeHtml(user.displayName)}</strong><small>Člen turnajového serveru</small><button class="logout" type="button">Odhlásit se</button></div>`;
      container.querySelector("button").addEventListener("click", async () => {
        await fetch("/api/auth/logout", { method: "POST" });
        location.reload();
      });
      document.getElementById("status").textContent = "Přihlášení proběhlo úspěšně.";
    });

    function escapeHtml(value) {
      const node = document.createElement("span");
      node.textContent = value;
      return node.innerHTML;
    }
  </script>
</body>
</html>
