<!doctype html><html lang="cs"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#070908"><title>Účastníci — MechaTurnaj</title><style>:root{color-scheme:dark;--lime:#a6ef2f;--cyan:#22b8ef;--pink:#ed3d74;font-family:Inter,system-ui,sans-serif}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:#070908;color:#f3f1e9}body:before{content:"";position:fixed;inset:0;z-index:-2;background:linear-gradient(#050706d9,#050706f5),url('/Obrazky/uvodni-pozadi.png') center/cover}body:after{content:"";position:fixed;inset:0;z-index:-1;background:radial-gradient(circle at 50% 20%,#a6ef2f12,transparent 45%)}.wrap{width:min(1120px,calc(100% - 32px));margin:auto}.nav{display:flex;justify-content:space-between;align-items:center;margin-top:18px;padding:14px 18px;border:1px solid #ffffff1b;border-radius:18px;background:#090c0ad9;backdrop-filter:blur(18px)}.brand{font-weight:950;letter-spacing:.1em;text-decoration:none}.brand i{color:var(--lime);font-style:normal}.nav div{display:flex;gap:10px}.nav div a{padding:9px 11px;border-radius:10px;color:#bec4bf;font-size:.8rem;font-weight:800;text-decoration:none}.nav div a:hover{background:#ffffff0c;color:#fff}main{padding:90px 0}.eyebrow{margin:0 0 12px;color:var(--lime);font-size:.72rem;font-weight:950;letter-spacing:.22em;text-transform:uppercase}h1{margin:0;font-size:clamp(3rem,8vw,6.8rem);line-height:.85;letter-spacing:-.07em;text-transform:uppercase}.lead{max-width:650px;margin:22px 0 35px;color:#9ca49d;line-height:1.65}.count{color:var(--cyan)}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px}.card{position:relative;padding:20px;border:1px solid #ffffff17;border-radius:21px;background:#ffffff07;overflow:hidden;animation:in .55s ease-out both}.card:before{content:"";position:absolute;inset:auto -30% -70% 20%;height:130px;background:var(--card,#a6ef2f);filter:blur(65px);opacity:.12}.person{display:flex;align-items:center;gap:13px}.avatar{width:58px;height:58px;border:2px solid var(--card,#a6ef2f);border-radius:17px;object-fit:cover;background:#111}.person strong,.person small{display:block}.person strong{font-size:1.05rem}.person small{margin-top:4px;color:#919991}.meta{display:flex;gap:8px;margin-top:18px}.tag{padding:7px 9px;border-radius:99px;background:#ffffff0b;color:#aeb5af;font-size:.68rem;font-weight:800}.empty{padding:35px;border:1px dashed #ffffff22;border-radius:20px;color:#919991;text-align:center}@keyframes in{from{opacity:0;transform:translateY(20px)}}@media(max-width:650px){.nav div a:not(:last-child){display:none}main{padding-top:65px}}</style></head><body><nav class="nav wrap"><a class="brand" href="/">MECHA<i>TURNAJ</i></a><div><a href="/">Hlavní stránka</a><a href="/turnaj?mode=spectator">Sledovat turnaj</a></div></nav><main class="wrap"><p class="eyebrow">Oficiální sestava</p><h1>Účastníci<br>turnaje</h1><p class="lead">Seznam hráčů, jejichž přihláška byla schválena organizačním týmem. Aktuálně je registrováno <strong class="count" id="count">–</strong> soutěžících.</p><div class="grid" id="grid"><p class="empty">Načítám účastníky…</p></div></main><script>const colors=['#a6ef2f','#22b8ef','#ed3d74','#9b57e5','#ff8b19'];load();async function load(){try{const r=await fetch('/api/tournament/participants'),o=await r.json();if(!r.ok)throw Error(o.error);count.textContent=o.participants.length;grid.innerHTML=o.participants.map((p,i)=>{const avatar=p.discordAvatar?`https://cdn.discordapp.com/avatars/${p.discordId}/${p.discordAvatar}.png?size=128`:'https://cdn.discordapp.com/embed/avatars/0.png';return `<article class="card" style="--card:${colors[i%colors.length]};animation-delay:${Math.min(i,12)*55}ms"><div class="person"><img class="avatar" src="${avatar}" alt=""><div><strong>${esc(p.nickname)}</strong><small>${esc(p.displayName)}</small></div></div><div class="meta"><span class="tag">${esc(p.country)}</span><span class="tag">${esc(p.experience)}</span></div></article>`}).join('')||'<p class="empty">Zatím nebyl schválen žádný účastník.</p>'}catch(e){grid.innerHTML=`<p class="empty">${esc(e.message||'Účastníky se nepodařilo načíst.')}</p>`}}function esc(v){const n=document.createElement('span');n.textContent=v??'';return n.innerHTML}</script></body></html>
