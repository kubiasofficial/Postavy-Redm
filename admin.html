<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Přihlášky — MechaTurnaj</title>
<style>:root{color-scheme:dark;--lime:#a6ef2f;--cyan:#22b8ef;font-family:Inter,system-ui,sans-serif}*{box-sizing:border-box}body{margin:0;background:#080a09;color:#f3f2ec}.shell{display:grid;grid-template-columns:240px 1fr;min-height:100vh}.side{padding:25px 18px;border-right:1px solid #ffffff12;background:#0c100d}.brand{display:block;margin:5px 9px 35px;font-weight:950;letter-spacing:.1em;text-decoration:none}.brand i{color:var(--lime);font-style:normal}.side a{display:block;margin:7px 0;padding:12px;border-radius:11px;color:#aab1ab;font-size:.84rem;font-weight:800;text-decoration:none}.side a:hover,.side .active{background:#ffffff0b;color:#fff}.main{padding:32px}.top{display:flex;justify-content:space-between;align-items:end;gap:20px}.top h1{margin:0;font-size:clamp(2rem,5vw,3.7rem);letter-spacing:-.06em}.muted{color:#909891}.button{padding:11px 14px;border:1px solid #ffffff1c;border-radius:11px;background:#ffffff0b;color:#fff;font-weight:850;cursor:pointer}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:28px 0}.stat{padding:19px;border:1px solid #ffffff12;border-radius:17px;background:#ffffff07}.stat strong{display:block;font-size:2rem}.stat span{color:#89918a;font-size:.72rem}.filters{display:flex;gap:8px;margin-bottom:15px}.filter{padding:9px 13px;border:1px solid #ffffff16;border-radius:99px;background:transparent;color:#a8afa9}.filter.active{border-color:var(--lime);color:var(--lime)}.list{display:grid;gap:12px}.card{display:grid;grid-template-columns:1fr auto;gap:20px;padding:20px;border:1px solid #ffffff12;border-radius:18px;background:#ffffff06}.person{display:flex;align-items:center;gap:12px}.avatar{width:48px;height:48px;border:2px solid var(--lime);border-radius:14px}.person strong,.person small{display:block}.person small{color:#8c948d}.details{display:flex;flex-wrap:wrap;gap:14px;margin-top:13px;color:#a7aea8}.details a{color:var(--cyan)}.actions{display:flex;align-items:center;gap:8px}.approve,.reject{padding:10px;border:0;border-radius:10px;color:white;font-weight:850}.approve{background:#2d9d55}.reject{background:#a93d4b}.pill{padding:7px 10px;border-radius:99px}.pending{color:#ffc84b}.approved{color:var(--lime)}.rejected{color:#ff7386}@media(max-width:800px){.shell{grid-template-columns:1fr}.main{padding:20px}.stats{grid-template-columns:1fr}.card{grid-template-columns:1fr}}</style>
</head>
<body>
<div class="shell">
<aside class="side">
<a class="brand" href="/">MECHA<i>TURNAJ</i>
</a>
<a class="active" href="/admin">📝 Přihlášky</a>
<a href="/admin-turnaj">🎮 Řízení turnaje</a>
<a href="/turnaj?mode=spectator">👁 Pohled diváka</a>
<a href="/">← Hlavní stránka</a>
</aside>
<main class="main">
<header class="top">
<div>
<p class="muted">Organizační centrum</p>
<h1>Dashboard přihlášek</h1>
</div>
<button class="button" onclick="load()">Obnovit</button>
</header>
<div class="stats">
<div class="stat">
<strong id="pending">–</strong>
<span>Čeká</span>
</div>
<div class="stat">
<strong id="approved">–</strong>
<span>Schváleno</span>
</div>
<div class="stat">
<strong id="rejected">–</strong>
<span>Zamítnuto</span>
</div>
</div>
<div class="filters">
<button class="filter active" data-f="all">Všechny</button>
<button class="filter" data-f="pending">Čekající</button>
<button class="filter" data-f="approved">Schválené</button>
<button class="filter" data-f="rejected">Zamítnuté</button>
</div>
<div class="list" id="list">Načítám…</div>
</main>
</div>
<script>let apps=[],filter='all';document.querySelectorAll('[data-f]').forEach(b=>b.onclick=()=>{filter=b.dataset.f;document.querySelectorAll('[data-f]').forEach(x=>x.classList.toggle('active',x===b));render()});load();async function load(){const r=await fetch('/api/tournament/admin/applications'),o=await r.json();if(!r.ok){if(r.status===401||r.status===403)location.href='/';return list.textContent=o.error}apps=o.applications;['pending','approved','rejected'].forEach(s=>document.getElementById(s).textContent=apps.filter(a=>a.status===s).length);render()}function render(){const rows=apps.filter(a=>filter==='all'||a.status===filter);list.innerHTML=rows.map(a=>{const av=a.discordAvatar?`https://cdn.discordapp.com/avatars/${a.discordId}/${a.discordAvatar}.png?size=128`:'https://cdn.discordapp.com/embed/avatars/0.png',buttons=a.status==='pending'?`<div class="actions">
<button class="approve" onclick="review('${a.discordId}','approved')">Schválit</button>
<button class="reject" onclick="review('${a.discordId}','rejected')">Zamítnout</button>
</div>`:a.status==='approved'?`<div class="actions"><span class="pill approved">Schváleno</span><button class="reject" style="cursor:pointer" onclick="review('${a.discordId}','removed')">Odebrat přihlášku</button></div>`:`<span class="pill ${a.status}">${a.status}</span>`;return `<article class="card">
<div>
<div class="person">
<img class="avatar" src="${av}">
<div>
<strong>${esc(a.nickname)}</strong>
<small>${esc(a.displayName)}</small>
</div>
</div>
<div class="details">
<span>${esc(a.country)}</span>
<span>${esc(a.experience)}</span>
<a href="${esc(a.steamProfile)}" target="_blank">Steam ↗</a>
</div>${a.note?`<p>${esc(a.note)}</p>`:''}${a.rejectionReason?`<p>Důvod: ${esc(a.rejectionReason)}</p>`:''}</div>${buttons}</article>`}).join('')||'<p class="muted">Zatím nic.</p>'}async function review(id,decision){let reason='';if(decision==='rejected'){reason=prompt('Důvod zamítnutí:')?.trim()||'';if(!reason)return}else if(decision==='removed'){if(!confirm('Odebrat hráči schválení a vrátit mu Discord roli Zájemce?'))return}else if(!confirm('Schválit a změnit Discord role?'))return;const r=await fetch('/api/tournament/admin/review',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({discordId:id,decision,reason})}),o=await r.json();if(!r.ok)return alert(o.error);load()}function esc(v){const n=document.createElement('span');n.textContent=v??'';return n.innerHTML}</script>
</body>
</html>
