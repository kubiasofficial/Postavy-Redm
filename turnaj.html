<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#070908">
  <title>Živý turnaj — MechaTurnaj</title>
  <style>
    :root{color-scheme:dark;--lime:#a6ef2f;--cyan:#22b8ef;--pink:#ed3d74;--violet:#9b57e5;--orange:#ff8b19;font-family:Inter,ui-sans-serif,system-ui,sans-serif}*{box-sizing:border-box}[hidden]{display:none!important}body{margin:0;min-height:100vh;color:#f4f1e8;background:#070908;overflow-x:hidden}body:before{content:"";position:fixed;inset:0;z-index:-2;background:linear-gradient(rgba(4,6,5,.75),rgba(4,6,5,.92)),url('/Obrazky/uvodni-pozadi.png') center/cover}body:after{content:"";position:fixed;inset:0;z-index:-1;background:radial-gradient(circle at 50% 30%,rgba(34,184,239,.09),transparent 45%)}.wrap{width:min(1180px,calc(100% - 32px));margin:auto}.nav{position:sticky;top:16px;z-index:20;display:flex;justify-content:space-between;align-items:center;margin-top:16px;padding:13px 17px;border:1px solid #ffffff1c;border-radius:18px;background:#090c0ad9;backdrop-filter:blur(18px)}.brand{font-weight:950;letter-spacing:.1em;text-decoration:none}.brand i{color:var(--lime);font-style:normal}.nav-actions{display:flex;align-items:center;gap:10px}.nav a:not(.brand){padding:9px 12px;border-radius:10px;color:#cbd0cc;font-size:.8rem;font-weight:800;text-decoration:none}.nav a:hover{background:#ffffff0d}.live{display:flex;align-items:center;gap:7px;color:#ff6377;font-size:.7rem;font-weight:900;letter-spacing:.14em}.live:before{content:"";width:8px;height:8px;border-radius:50%;background:currentColor;box-shadow:0 0 14px currentColor;animation:pulse 1.2s infinite}.stage{min-height:calc(100vh - 90px);display:grid;place-items:center;padding:70px 0}.panel{width:100%;text-align:center}.eyebrow{color:var(--lime);font-size:.72rem;font-weight:950;letter-spacing:.22em;text-transform:uppercase}.mega{margin:12px auto 18px;max-width:980px;font-size:clamp(3.2rem,9vw,8rem);line-height:.84;letter-spacing:-.07em;text-transform:uppercase;text-shadow:0 8px 1px #000;animation:title-in .8s cubic-bezier(.2,.8,.2,1)}.mega .accent{display:block;color:var(--cyan);font-size:.6em}.lead{max-width:650px;margin:0 auto 28px;color:#aab1ab;font-size:1.05rem;line-height:1.7}.button{display:inline-flex;justify-content:center;align-items:center;min-height:54px;padding:0 21px;border:1px solid #ffffff24;border-radius:14px;background:#ffffff0b;color:#fff;font:inherit;font-weight:900;cursor:pointer;text-decoration:none}.button.primary{border:0;background:linear-gradient(135deg,var(--cyan),#5865f2);box-shadow:0 15px 45px #2257d947}.button:disabled{opacity:.55;cursor:default}.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(185px,1fr));gap:13px;margin-top:35px;text-align:left}.player{position:relative;padding:17px;border:1px solid #ffffff18;border-radius:19px;background:#ffffff08;overflow:hidden;transition:.25s}.player.hunter{border-color:var(--orange);box-shadow:0 0 35px #ff8b1925}.player.eliminated{filter:grayscale(.7);opacity:.55}.player.eliminated:after{content:"×";position:absolute;inset:0;display:grid;place-items:center;color:#ff4058;font-size:6rem;font-weight:300;text-shadow:0 0 18px #000}.identity{display:flex;align-items:center;gap:11px}.avatar{width:47px;height:47px;border:2px solid var(--lime);border-radius:14px;object-fit:cover;background:#111}.player strong,.player small{display:block}.player small{margin-top:4px;color:#929a93}.score{margin-top:15px;color:#fff;font-size:1.6rem;font-weight:950}.score span{color:#8e9690;font-size:.7rem;font-weight:700}.tag{position:absolute;top:12px;right:12px;padding:6px 8px;border-radius:999px;background:#ff8b1920;color:var(--orange);font-size:.62rem;font-weight:950;text-transform:uppercase}.eliminated-label{position:relative;z-index:1;margin-top:10px;color:#ff6579!important;font-weight:950}.progress{max-width:600px;margin:25px auto}.progress-bar{height:8px;border-radius:99px;background:#ffffff12;overflow:hidden}.progress-bar i{display:block;height:100%;border-radius:inherit;background:linear-gradient(90deg,var(--lime),var(--cyan));transition:width .5s}.progress p{color:#9da49e;font-size:.8rem}.vote{max-width:800px;margin:30px auto 0;padding:24px;border:1px solid #ffffff18;border-radius:22px;background:#0b0e0cd9;text-align:left}.vote-head{display:flex;justify-content:space-between;gap:20px;align-items:center}.budget{color:var(--lime);font-size:1.2rem;font-weight:950}.vote-row{display:grid;grid-template-columns:1fr 100px;gap:12px;align-items:center;padding:12px 0;border-bottom:1px solid #ffffff0d}.vote-row input{padding:12px;border:1px solid #ffffff1c;border-radius:10px;background:#ffffff0a;color:#fff}.message{min-height:22px;margin-top:15px;color:#ffc84b;font-weight:800}.podium{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;align-items:end;max-width:850px;margin:50px auto 0}.place{padding:28px 18px;border:1px solid #ffffff1a;border-radius:22px;background:#ffffff08}.place:first-child{order:2;min-height:270px;border-color:#d8ad68;box-shadow:0 0 70px #d8ad6820}.place:nth-child(2){order:1}.place:nth-child(3){order:3}.place .medal{font-size:2rem}.place img{width:75px;height:75px;border-radius:22px;object-fit:cover}.place strong{display:block;margin:12px 0 5px;font-size:1.25rem}.paint{position:fixed;width:10px;height:10px;border-radius:50%;pointer-events:none;animation:confetti 3s linear forwards}@keyframes pulse{50%{opacity:.3;scale:.75}}@keyframes title-in{from{opacity:0;transform:translateY(35px) scale(.92);filter:blur(12px)}}@keyframes confetti{to{translate:0 105vh;rotate:720deg}}@media(max-width:650px){.stage{padding:45px 0}.nav .live{display:none}.mega{font-size:15vw}.podium{grid-template-columns:1fr}.place,.place:first-child{order:initial;min-height:auto}.vote-row{grid-template-columns:1fr 75px}}
  </style>
</head>
<body>
  <nav class="nav wrap"><a class="brand" href="/">MECHA<i>TURNAJ</i></a><div class="nav-actions"><span class="live" id="liveBadge">Živý přenos</span><a href="/">Hlavní stránka</a><a id="adminLink" href="/admin" hidden>Administrace</a></div></nav>
  <main class="stage wrap"><div class="panel" id="view"><p class="eyebrow">Načítám živý přenos</p><h1 class="mega">MechaTurnaj</h1></div></main>
  <script>
    const view=document.getElementById('view');let data=null;let sending=false;
    const roundColors=['','#a6ef2f','#ff8b19','#22b8ef','#9b57e5','#ed3d74'];
    load();setInterval(load,3000);
    async function load(){try{const r=await fetch('/api/tournament/state');if(!r.ok)throw Error();data=await r.json();render()}catch{view.innerHTML='<p class="eyebrow">Spojení přerušeno</p><h1 class="mega">Obnovuji přenos…</h1>'}}
    function render(){const t=data.tournament,v=data.viewer;document.getElementById('liveBadge').hidden=t.status==='not_started';
      if(t.status==='not_started')return screen('Turnaj ještě nezačal!','Pořadatelé připravují herní plán. Zůstaň na této stránce — přenos se spustí automaticky.',spectatorNote());
      if(t.status==='lobby'){const action=v.approved&&!v.ready?'<button class="button primary" onclick="joinLobby()">Vstoupit do turnaje</button>':v.ready?'<p class="message">✓ Jsi připraven. Čekáme na start.</p>':spectatorNote();return screen('Čekárna je otevřená',`${t.readyIds.length} hráčů je připraveno na start.`,action+players(t));}
      if(t.phase==='round_intro')return screen(`${t.currentRound}. ${t.roundName}`,'Nová výzva začíná. Připrav se splynout s okolím.',players(t));
      if(t.phase==='hunter_turns'){const hunter=t.players.find(p=>p.id===t.currentHunterId);return screen('Hunter na tahu',hunter?`${hunter.nickname} právě hledá ukryté hráče.`:'Čekáme na dalšího Huntera.',progress(t)+players(t));}
      if(t.phase==='scoring'||t.phase==='ready_to_publish')return screen('Kolo dokončeno','Pořadatelé právě zapisují body a připravují výsledky.',players(t));
      if(t.phase==='voting')return screen('Hlasování hráčů',`Rozděl svůj příděl ${t.voteBudget} bodů mezi ostatní aktivní hráče.`,v.approved&&!v.eliminated&&!t.hasVoted?voteForm(t):'<p class="message">Hlasování sleduješ jako divák nebo už máš odevzdáno.</p>'+players(t));
      if(t.phase==='round_results')return screen(`Výsledky ${t.currentRound}. kola`,'Aktuální pořadí po uzavření kola.',players(t));
      if(t.phase==='tournament_end')return screen('Konec turnaje','Čekej na vyhlášení konečných výsledků…','<div class="progress"><div class="progress-bar"><i style="width:100%"></i></div></div>');
      if(t.phase==='podium')return podium(t);screen('Turnaj','Čekáme na další pokyn pořadatele.',players(t));}
    function screen(title,lead,extra=''){view.innerHTML=`<p class="eyebrow">MechaTurnaj • živě</p><h1 class="mega">${esc(title)}</h1><p class="lead">${esc(lead)}</p>${extra}`}
    function spectatorNote(){return '<p class="message">Režim diváka — průběh turnaje se bude aktualizovat automaticky.</p>'}
    function progress(t){const pct=t.hunterProgress.total?100*t.hunterProgress.completed/t.hunterProgress.total:0;return `<div class="progress"><div class="progress-bar"><i style="width:${pct}%"></i></div><p>Hunterové ${t.hunterProgress.completed} / ${t.hunterProgress.total}</p></div>`}
    function avatar(p){return p.avatar?`https://cdn.discordapp.com/avatars/${p.id}/${p.avatar}.png?size=128`:'https://cdn.discordapp.com/embed/avatars/0.png'}
    function players(t){return `<div class="cards">${t.players.map(p=>`<article class="player ${p.eliminated?'eliminated':''} ${p.id===t.currentHunterId?'hunter':''}">${p.id===t.currentHunterId?'<span class="tag">Hunter</span>':''}<div class="identity"><img class="avatar" src="${avatar(p)}" alt=""><div><strong>${esc(p.nickname)}</strong><small>${esc(p.displayName)}</small></div></div><div class="score">${p.score} <span>bodů</span></div>${p.eliminated?'<small class="eliminated-label">VYŘAZEN</small>':''}</article>`).join('')}</div>`}
    function voteForm(t){const me=data.viewer.id;const candidates=t.players.filter(p=>!p.eliminated&&p.id!==me);return `<form class="vote" onsubmit="submitVote(event)"><div class="vote-head"><div><strong>Rozdělení bodů</strong><small style="display:block;color:#929a93">Sobě body dát nemůžeš.</small></div><span class="budget">Zbývá: <b id="remaining">${t.voteBudget}</b></span></div>${candidates.map(p=>`<label class="vote-row"><span>${esc(p.nickname)}</span><input name="${p.id}" type="number" min="0" max="${t.voteBudget}" value="0" oninput="recount()"></label>`).join('')}<button class="button primary" type="submit">Odevzdat hlasování</button><p class="message" id="voteMessage"></p></form>`}
    function recount(){const inputs=[...document.querySelectorAll('.vote input')];const used=inputs.reduce((n,i)=>n+(Number(i.value)||0),0);document.getElementById('remaining').textContent=data.tournament.voteBudget-used}
    async function joinLobby(){if(sending)return;sending=true;const r=await fetch('/api/tournament/join',{method:'POST'});const out=await r.json();if(!r.ok)alert(out.error);sending=false;load()}
    async function submitVote(e){e.preventDefault();const allocations=Object.fromEntries([...new FormData(e.target)].map(([k,v])=>[k,Number(v)]));const r=await fetch('/api/tournament/vote',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({allocations})});const out=await r.json();if(!r.ok){document.getElementById('voteMessage').textContent=out.error;return}load()}
    function podium(t){confetti();const places=t.finalResults.slice(0,3);view.innerHTML=`<p class="eyebrow">Konečné výsledky</p><h1 class="mega">Máme vítěze!</h1><div class="podium">${places.map((p,i)=>`<article class="place"><span class="medal">${['🥇','🥈','🥉'][i]}</span><img src="${avatar(p)}" alt=""><strong>${esc(p.nickname)}</strong><small>${p.score} bodů</small>${i===0&&data.viewer.id===p.id?'<p class="message">Gratulujeme! Výhra bude do 24 hodin připsána na tvůj Steam účet.</p>':''}</article>`).join('')}</div>`}
    function confetti(){if(document.body.dataset.party)return;document.body.dataset.party='1';for(let i=0;i<90;i++){const c=document.createElement('i');c.className='paint';c.style.cssText=`left:${Math.random()*100}vw;top:-20px;background:${roundColors[1+Math.floor(Math.random()*5)]};animation-delay:${Math.random()*2}s`;document.body.append(c)}}
    function esc(v){const n=document.createElement('span');n.textContent=v??'';return n.innerHTML}
  </script>
</body></html>
